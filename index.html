<!DOCTYPE html>
<html>
<head>
    <title>TPM Vibe Tool</title>
    <style>
        body { 
    font-family: 'Comic Sans MS', cursive; 
    background: linear-gradient(45deg, #ff00ff, #00ffff); 
    color: white;
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    height: 100vh; 
}
button { 
    padding: 20px; 
    border-radius: 50%; 
    border: 5px solid yellow; 
    background: black; 
    color: yellow;
    font-weight: bold;
}
         </style>
</head>
<body>
    <h1>Should we push to Prod?</h1>
    <button onclick="decide()">Ask the Vibe</button>
    <h2 id="result"></h2>

    <script>
        function decide() {
            const answers = ["Yes, vibes are high.", "No, the sprint is cursed.", "Ask again after standup.", "LGTM!", "Rollback immediately."];
            document.getElementById('result').innerText = answers[Math.floor(Math.random() * answers.length)];
        }
    </script>
</body>
</html>
